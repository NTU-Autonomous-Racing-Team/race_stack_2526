controller_manager_node:
  ros__parameters:

    # -------------------------------------------------------
    # Waypoints
    # -------------------------------------------------------
    waypoints_path: "./src/pure_pursuit/racelines/korea_mintime_sparse.csv"
    reverse_waypoints: false         # Set true to drive anticlockwise
    local_waypoints_window: 10          
    # -------------------------------------------------------
    # Topics
    # -------------------------------------------------------
    odom_topic:      "/ego_racecar/odom"
    opp_odom_topic:  "/opp_racecar/odom"
    drive_topic:     "/drive"
    opp_drive_topic:  "/opp_drive"
    # -------------------------------------------------------
    # Pure Pursuit
    # -------------------------------------------------------
    wheelbase:            0.33
    min_lookahead:        0.3        # metres
    max_lookahead:        1.8        # metres
    lookahead_ratio:      9.0
    K_p:                  0.5
    steering_limit:       25.0       # degrees
    velocity_percentage:  1.2

    max_steering_rate:         0.15  # max radians the wheels can turn per frame
