controller_manager_node:
  ros__parameters:

    # -------------------------------------------------------
    # Waypoints
    # -------------------------------------------------------
    waypoints_path: "./src/pure_pursuit/racelines/korea_mintime_sparse.csv"
    reverse_waypoints: false         # Set true to drive anticlockwise
    local_waypoints_window: 10          
    # -------------------------------------------------------
    # Topics
    # -------------------------------------------------------
    odom_topic:      "/ego_racecar/odom"
    opp_odom_topic:  "/opp_racecar/odom"
    drive_topic:     "/drive"
    opp_drive_topic:  "/opp_drive"
    # -------------------------------------------------------
    # Pure Pursuit
    # -------------------------------------------------------
    wheelbase:            0.33
    min_lookahead:        0.3        # metres
    max_lookahead:        1.8        # metres
    lookahead_ratio:      9.0
    K_p:                  0.5
    steering_limit:       25.0       # degrees
    velocity_percentage:  1.2

    # -------------------------------------------------------
    # GB_TRACK Transition
    # -------------------------------------------------------
    transition_d_threshold:    0.1   # metres lateral offset to consider "on raceline"
    transition_s_threshold:    1.0   # metres ahead/behind nearest waypoint
    transition_frames_required: 30   # consecutive frames needed before leaving transition
    max_steering_rate:         0.15  # max radians the wheels can turn per frame

    # -------------------------------------------------------
    # Obstacle / Clearance Check
    # -------------------------------------------------------
    clearance_distance:   1.5        # metres ahead that must be clear
    safe_corridor_width:  0.45       # car width + safety margin (metres)
